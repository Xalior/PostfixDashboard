name: Publish container image (GHCR)

# Builds the multi-arch runner image (app + embedded `pfd-cli`/`cli`) and pushes
# it to GitHub Container Registry. Image name follows the repo:
#   ghcr.io/<owner>/<repo>   (lowercased)
# Pull on the host with e.g.  ghcr.io/<owner>/<repo>:main  or  :latest (on tags).

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['**.md', '.env.example', 'docs/**']
  workflow_dispatch:

# A newer push supersedes an in-flight build (the emulated arm64 leg is slow).
concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (runner target, amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
